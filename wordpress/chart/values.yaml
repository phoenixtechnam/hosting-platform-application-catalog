# WordPress application values
# These are the default values — the platform overrides them per deployment.

wordpress:
  siteTitle: "My WordPress Site"
  adminUser: "admin"
  adminPassword: ""  # Required — set by platform at deploy time
  adminEmail: ""     # Required — set by platform at deploy time
  image: "wordpress:php8.4-apache"
  replicas: 1

mariadb:
  image: "mariadb:10.6"
  rootPassword: ""   # Auto-generated by platform
  database: "wordpress"
  user: "wp_user"
  password: ""       # Auto-generated by platform
  storage: "5Gi"

ingress:
  enabled: true
  domain: ""         # Required — set by platform at deploy time
  tls: true
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "64m"

resources:
  cpuRequest: "0.25"
  cpuLimit: "1.00"
  memoryRequest: "256Mi"
  memoryLimit: "512Mi"

wpContent:
  storage: "5Gi"

cron:
  enabled: true
  schedule: "*/15 * * * *"
