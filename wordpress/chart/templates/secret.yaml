apiVersion: v1
kind: Secret
metadata:
  name: {{ include "wordpress.fullname" . }}-credentials
  labels:
    {{- include "wordpress.labels" . | nindent 4 }}
type: Opaque
stringData:
  WORDPRESS_DB_HOST: {{ include "wordpress.mariadb.fullname" . }}
  WORDPRESS_DB_NAME: {{ .Values.mariadb.database }}
  WORDPRESS_DB_USER: {{ .Values.mariadb.user }}
  WORDPRESS_DB_PASSWORD: {{ .Values.mariadb.password | quote }}
  WORDPRESS_ADMIN_USER: {{ .Values.wordpress.adminUser }}
  WORDPRESS_ADMIN_PASSWORD: {{ .Values.wordpress.adminPassword | quote }}
  WORDPRESS_ADMIN_EMAIL: {{ .Values.wordpress.adminEmail }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "wordpress.mariadb.fullname" . }}-credentials
  labels:
    {{- include "wordpress.labels" . | nindent 4 }}
type: Opaque
stringData:
  MARIADB_ROOT_PASSWORD: {{ .Values.mariadb.rootPassword | quote }}
  MARIADB_DATABASE: {{ .Values.mariadb.database }}
  MARIADB_USER: {{ .Values.mariadb.user }}
  MARIADB_PASSWORD: {{ .Values.mariadb.password | quote }}
