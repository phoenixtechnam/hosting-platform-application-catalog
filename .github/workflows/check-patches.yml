name: Check for Patch Updates

on:
  schedule:
    # Run twice weekly: Monday and Thursday at 06:00 UTC
    - cron: '0 6 * * 1,4'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write
  pull-requests: write

jobs:
  check-patches:
    name: Check for security patches
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Check for available patches
        id: check
        run: node scripts/check-patches.mjs || true

      - name: Apply patches
        if: steps.check.outputs.patches_found == 'true'
        run: node scripts/check-patches.mjs --apply

      - name: Validate updated manifests
        if: steps.check.outputs.patches_found == 'true'
        run: npm run validate

      - name: Create Pull Request
        if: steps.check.outputs.patches_found == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: 'fix(security): update ${{ steps.check.outputs.patch_count }} application image(s) to latest patch'
          title: '🔒 Security patches: ${{ steps.check.outputs.patch_count }} image update(s)'
          body: |
            ## Automated Patch Update

            The patch checker found **${{ steps.check.outputs.patch_count }}** newer patch version(s):

            ```
            ${{ steps.check.outputs.patch_summary }}
            ```

            These are patch-level updates within the same major.minor series — no breaking changes expected.

            ### Checklist
            - [ ] Review the image tag changes
            - [ ] Merge to trigger catalog sync
            - [ ] Apply patches to running instances via admin panel

            ---
            🤖 Generated by the automated patch checker
          branch: auto/patch-updates
          delete-branch: true
          labels: |
            security
            automated
